<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="card">

<h1>💳 Credit Card Approval Prediction</h1>

<p class="subtitle">

Fill in the applicant details below

</p>

<form action="/predict" method="POST">

<div class="grid">

<div class="input-box full">

<label>Applicant Name</label>

<input
type="text"
name="APPLICANT_NAME"
placeholder="Enter Applicant Name"
required>

</div>

<div class="input-box">

<label>Gender</label>

<select name="CODE_GENDER">

<option value="1">Male</option>
<option value="0">Female</option>

</select>

</div>

<div class="input-box">

<label>Own Car</label>

<select name="FLAG_OWN_CAR">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Own House</label>

<select name="FLAG_OWN_REALTY">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Number of Children</label>

<input
type="number"
name="CNT_CHILDREN"
min="0"
max="20"
placeholder="Example: 2"
required>

</div>

<div class="input-box">

<label>Annual Income</label>

<input
type="number"
name="AMT_INCOME_TOTAL"
min="0"
placeholder="Example: 180000"
required>

</div>

<div class="input-box">

<label>Income Type</label>

<select name="NAME_INCOME_TYPE">

<option value="4">Working</option>
<option value="0">Commercial Associate</option>
<option value="2">State Servant</option>
<option value="1">Pensioner</option>
<option value="3">Student</option>

</select>

</div>

<div class="input-box">

<label>Education</label>

<select name="NAME_EDUCATION_TYPE">

<option value="1">Higher Education</option>
<option value="4">Secondary / Secondary Special</option>
<option value="2">Incomplete Higher</option>
<option value="3">Lower Secondary</option>
<option value="0">Academic Degree</option>

</select>

</div>

<div class="input-box">

<label>Family Status</label>

<select name="NAME_FAMILY_STATUS">

<option value="1">Married</option>
<option value="3">Single / Not Married</option>
<option value="0">Civil Marriage</option>
<option value="2">Separated</option>
<option value="4">Widow</option>

</select>

</div>

<div class="input-box">

<label>Housing Type</label>

<select name="NAME_HOUSING_TYPE">

<option value="1">House / Apartment</option>
<option value="5">With Parents</option>
<option value="4">Rented Apartment</option>
<option value="2">Municipal Apartment</option>
<option value="3">Office Apartment</option>
<option value="0">Co-op Apartment</option>

</select>

</div>
<div class="input-box">

<label>Age (Years)</label>

<input
type="number"
id="age"
min="18"
max="100"
placeholder="Example: 30"
required>

<input
type="hidden"
name="DAYS_BIRTH"
id="days_birth">

</div>

<div class="input-box">

<label>Years Employed</label>

<input
type="number"
id="experience"
min="0"
max="60"
placeholder="Example: 5"
required>

<input
type="hidden"
name="DAYS_EMPLOYED"
id="days_employed">

</div>

<div class="input-box">

<label>Mobile Phone</label>

<select name="FLAG_MOBIL">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Work Phone</label>

<select name="FLAG_WORK_PHONE">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Phone</label>

<select name="FLAG_PHONE">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Email</label>

<select name="FLAG_EMAIL">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="input-box">

<label>Occupation</label>

<select name="OCCUPATION_TYPE">

<option value="0">Accountants</option>
<option value="1">Cleaning Staff</option>
<option value="2">Cooking Staff</option>
<option value="3">Core Staff</option>
<option value="4">Drivers</option>
<option value="5">HR Staff</option>
<option value="6">High Skill Tech Staff</option>
<option value="7">IT Staff</option>
<option value="8">Laborers</option>
<option value="9">Low Skill Laborers</option>
<option value="10">Managers</option>
<option value="11">Medicine Staff</option>
<option value="12">Private Service Staff</option>
<option value="13">Realty Agents</option>
<option value="14">Sales Staff</option>
<option value="15">Secretaries</option>
<option value="16">Security Staff</option>
<option value="17">Unknown</option>
<option value="18">Waiters/Barmen Staff</option>

</select>

</div>

<div class="input-box">

<label>Family Members</label>

<input
type="number"
name="CNT_FAM_MEMBERS"
min="1"
max="20"
placeholder="Example: 4"
required>

</div>

</div>

<button>

Predict Credit Approval

</button>
<br><br>

<a href="/history" class="btn">

View Prediction History

</a>
<br><br>

<a href="/dashboard" class="btn">

View Dashboard

</a>

</form>

</div>

</div>

<script>

document.querySelector("form").addEventListener("submit",function(){

let age=document.getElementById("age").value;

document.getElementById("days_birth").value=-(age*365);

let exp=document.getElementById("experience").value;

document.getElementById("days_employed").value=-(exp*365);

});

</script>

</body>

</html>
