<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>📋 Prediction History</h1>

        <p class="subtitle">

            All Saved Credit Card Predictions

        </p>

        <table class="history-table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Applicant Name</th>
                    <th>Prediction</th>
                    <th>Confidence</th>
                    <th>Date</th>
                    <th>Time</th>

                </tr>

            </thead>

            <tbody>

                {% for row in history %}

                <tr>

                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }} %</td>
                    <td>{{ row[4] }}</td>
                    <td>{{ row[5] }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <br>

        <a href="/" class="btn">

            ← Back to Prediction

        </a>

    </div>

</div>

</body>

</html>
